name: Generate Snake Animation

on:
  # Jalan otomatis tiap 24 jam
  schedule:
    - cron: "0 */24 * * *"

  # Bisa dijalanin manual dari tab Actions
  workflow_dispatch:

  # Jalan tiap push ke main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: rifamaysha
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Push snake ke branch output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
